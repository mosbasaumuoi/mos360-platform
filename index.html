<script>

// ===== LOAD COURSE =====
async function loadCourses() {
  try {
    const res = await fetch("/api/public/courses");
    const data = await res.json();

    const html = data.map(c => \`
      <div class="course">
        <h3>\${c.title}</h3>
        <p>\${c.description}</p>

        <a href="https://zalo.me/0912888360"
           class="btn"
           target="_blank"
           onclick="trackClick('zalo')">
          Đăng ký học
        </a>
      </div>
    \`).join("");

    document.getElementById("courses").innerHTML = html;

  } catch (e) {
    document.getElementById("courses").innerText = "Lỗi tải dữ liệu";
  }
}


// ===== TRACK SOCIAL =====
function trackAndOpen(source, url) {
  fetch("/api/public/track?source=" + source)
    .catch(() => {});

  window.open(url, "_blank");
}


// ===== TRACK COURSE =====
function trackClick(source) {
  fetch("/api/public/track?source=" + source)
    .catch(() => {});
}


// INIT
loadCourses();
